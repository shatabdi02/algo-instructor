<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Instructor AI</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="app">
<header>
    <div class="avatar"><i class="fas fa-brain"></i></div>
    <div>
        <b>DSA Instructor AI</b>
        <small>Ask anything about DSA</small>
    </div>
</header>

<div id="chat"></div>
<div id="typing">AI is typing...</div>

<footer>
    <input id="input" placeholder="Ask DSA question...">
    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
</footer>
</div>

<script src="script.js"></script>
</body>
</html>
